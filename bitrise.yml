---
format_version: '26'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: android
app:
  envs:
  - PROJECT_LOCATION: "."
    opts:
      is_expand: false
  - MODULE: app
    opts:
      is_expand: false
  - VARIANT: debug
    opts:
      is_expand: false
workflows:
  build_apk:
    summary: Build debug APK
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex
            # Даём права на выполнение
            chmod +x ./gradlew
            # Скачиваем gradle-wrapper.jar если его нет (если заливал через веб)
            if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
              mkdir -p gradle/wrapper
              curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
            fi
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: "./gradlew"
    - android-build@1:
        inputs:
        - project_location: "."
        - module: app
        - variant: debug
        - build_type: apk
        - cache_level: none
    - deploy-to-bitrise-io@2: {}
meta:
  bitrise.io:
    stack: ubuntu-noble-24.04-bitrise-2025-android
    machine_type_id: elite
