---
format_version: '26'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: android
app:
  envs:
  - PROJECT_LOCATION: "."
    opts:
      is_expand: false
  - MODULE: app
    opts:
      is_expand: false
  - VARIANT: debug
    opts:
      is_expand: false
workflows:
  build_apk:
    summary: Build debug APK
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - script@1:
        title: Download Gradle Wrapper & Build APK
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex
            
            # Скачиваем чистые, официальные файлы Gradle Wrapper, перезаписывая кривые
            curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew
            curl -L -o gradlew.bat https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew.bat
            mkdir -p gradle/wrapper
            curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
            curl -L -o gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.properties
            
            # Даём права на выполнение
            chmod +x ./gradlew
            
            # Проверяем, что файл валидный
            head -n 5 ./gradlew
            
            # Собираем APK
            ./gradlew assembleDebug --no-daemon
            
            # Кладём APK туда, где Bitrise его отдаст для скачивания
            mkdir -p $BITRISE_DEPLOY_DIR
            cp app/build/outputs/apk/debug/app-debug.apk $BITRISE_DEPLOY_DIR/app-debug.apk
            envman add --key BITRISE_APK_PATH --value $BITRISE_DEPLOY_DIR/app-debug.apk
    - deploy-to-bitrise-io@2: {}
meta:
  bitrise.io:
    stack: ubuntu-noble-24.04-bitrise-2025-android
    machine_type_id: elite
